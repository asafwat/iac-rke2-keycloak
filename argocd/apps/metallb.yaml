apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    # Same wave as cert-manager - parallel install. CRDs must register before
    # wave -2 (where IPAddressPool + L2Advertisement land).
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    targetRevision: 0.16.1
    helm:
      releaseName: metallb
      values: |
        controller:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        speaker:
          enabled: true
          # Disable the FRR-K8s BGP speaker. We use L2 mode only (L2Advertisement
          # CR in metallb-config), so the BGP integration is unused. On this
          # multi-NIC Vagrant box the FRR speaker binds to the wrong interface
          # (10.0.2.15 NAT, not the 192.168.56.10 host-only network), then its
          # liveness probe fails and the pod thrashes - cosmetic but noisy.
          frr:
            enabled: false
          frrk8s:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        crds:
          enabled: true                # install CRDs as part of the chart
        prometheus:
          serviceAccount: ""           # TODO: flip metrics on with Prom/Grafana stack
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m