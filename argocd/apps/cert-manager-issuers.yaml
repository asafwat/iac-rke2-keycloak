apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuers
  namespace: argocd
  annotations:
    # Applied after cert-manager CRDs are registered.
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/asafwat/iac-rke2-keycloak.git
    targetRevision: main
    path: manifests/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    # selfHeal alone doesn't retry FAILED sync operations - only drift. The
    # cert-manager webhook isn't always Ready at first apply time, causing
    # a transient "no endpoints available" error that needs proper retry.
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m