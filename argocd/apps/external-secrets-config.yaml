apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    # After ESO CRDs register (wave -1) and after Vault is initialized.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/asafwat/iac-rke2-keycloak.git
    targetRevision: main
    path: manifests/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    # ESO webhook may not be Ready at first sync attempt. Retry pattern
    # required because selfHeal doesn't retry FAILED syncs, only drift.
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m