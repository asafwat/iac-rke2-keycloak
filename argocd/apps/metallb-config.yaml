apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  annotations:
    # Applied after MetalLB CRDs are registered. Same wave as cert-manager-issuers.
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/asafwat/iac-rke2-keycloak.git
    targetRevision: main
    path: manifests/metallb
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    # MetalLB webhook may not be Ready at first sync attempt. Same retry
    # pattern as cert-manager-issuers - selfHeal alone won't retry FAILED
    # sync operations, only drift.
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m