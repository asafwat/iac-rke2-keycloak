apiVersion: v2
name: longhorn-config
description: |
  Post-install Longhorn configuration:
    - ExternalSecret materializing AWS-style creds for the MinIO backup target
    - Settings CRs to point Longhorn at the MinIO backup bucket
    - RecurringJob CR to schedule daily snapshot + backup of all PVCs
  Lives separately from the Longhorn install Application because all of the
  above depend on (a) Longhorn CRDs being present and (b) ESO + Vault being
  functional - a strictly later sync wave.
type: application
version: 0.1.0
appVersion: "1.10.0"