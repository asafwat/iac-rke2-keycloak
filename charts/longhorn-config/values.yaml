# ─────────────────────────────────────────────────────────────────────────────
# longhorn-config wrapper values
# ─────────────────────────────────────────────────────────────────────────────

# ── Wrapper: ESO config ──────────────────────────────────────────────────────
externalSecrets:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: vault                                # ClusterSecretStore from Phase 7
    kind: ClusterSecretStore

# ── Longhorn S3 backup target ────────────────────────────────────────────────
# MinIO is the backend; bucket is created by the MinIO provisioning Job.
# Endpoint is the in-cluster MinIO Service (HTTP - TLS terminates at Traefik
# for external traffic, not needed cluster-internal).
backupTarget:
  bucket: longhorn-backups
  # Longhorn S3 URL format: s3://<bucket>@<region>/<path>
  # Region for MinIO is fake but mandatory in the URL syntax.
  region: us-east-1
  endpoint: http://minio.minio.svc.cluster.local:9000
  # Path-style addressing required for MinIO (virtual-hosted is AWS-only).
  virtualHostedStyle: false

# ── RecurringJob: daily snapshot + backup of every Longhorn PVC ──────────────
# Selector "default" targets PVCs labelled recurring-job-group/default=enabled,
# OR the chart-default behaviour of applying to all volumes when the
# allowDetachedVolume flag is set (see CR below).
recurringJob:
  enabled: true
  name: daily-backup
  cron: "0 3 * * *"             # 03:00 every day
  retain: 7                     # keep 7 most-recent backups per volume
  concurrency: 2
  # backup = snapshot + upload to S3 backup target.
  task: backup