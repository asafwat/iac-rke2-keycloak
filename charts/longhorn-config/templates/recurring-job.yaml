{{- if .Values.recurringJob.enabled }}
# RecurringJob: snapshot every Longhorn volume + push to the S3 backup target.
# - task: backup = snapshot + upload (vs "snapshot" which is local only)
# - groups: [default] makes this the implicit job for any volume that doesn't
#   opt out. Volumes also need the recurring-job.longhorn.io/source: enabled
#   label, OR the longhorn StorageClass `recurringJobSelector` parameter
#   pre-attaches them. We rely on the chart's defaultClass which sets this
#   via the storageClass annotation pattern - documented in decisions.md.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: {{ .Values.recurringJob.name }}
  namespace: {{ .Release.Namespace }}
spec:
  cron:        {{ .Values.recurringJob.cron | quote }}
  task:        {{ .Values.recurringJob.task | quote }}
  groups:      ["default"]
  retain:      {{ .Values.recurringJob.retain }}
  concurrency: {{ .Values.recurringJob.concurrency }}
  labels:
    purpose: "scheduled-backup"
{{- end }}