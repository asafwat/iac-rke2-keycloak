{{- if .Values.externalSecrets.enabled }}
# Longhorn expects the backup-target credentials in a Secret with these
# specific keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ENDPOINTS.
# ESO materializes them from Vault path secret/minio/longhorn-backup-keys
# (seeded by init-vault.* during cluster bootstrap).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-backup-target
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: longhorn-backup-target
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID:     "{{ `{{ .access_key }}` }}"
        AWS_SECRET_ACCESS_KEY: "{{ `{{ .secret_key }}` }}"
        AWS_ENDPOINTS:         {{ .Values.backupTarget.endpoint | quote }}
  data:
    - secretKey: access_key
      remoteRef:
        key: minio/longhorn-backup-keys
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: minio/longhorn-backup-keys
        property: secret_key
{{- end }}