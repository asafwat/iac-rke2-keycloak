# Longhorn 1.7+ uses the BackupTarget CRD as the source of truth, not the
# legacy `Setting backup-target` / `Setting backup-target-credential-secret`.
# Longhorn auto-creates a BackupTarget named "default" with empty fields on
# first install; we own its spec via ServerSideApply.
#
# (The Setting CRs are kept below as belt-and-braces for forward/backward
#  compatibility, but the BackupTarget below is what actually unblocks
#  `backupAndCleanup` operations against MinIO.)
---
apiVersion: longhorn.io/v1beta1
kind: BackupTarget
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
spec:
  backupTargetURL: "s3://{{ .Values.backupTarget.bucket }}@{{ .Values.backupTarget.region }}/"
  credentialSecret: "longhorn-backup-target"
  pollInterval: "5m0s"
---
apiVersion: longhorn.io/v1beta2
kind: Setting
metadata:
  name: backup-target
  namespace: {{ .Release.Namespace }}
value: "s3://{{ .Values.backupTarget.bucket }}@{{ .Values.backupTarget.region }}/"
---
apiVersion: longhorn.io/v1beta2
kind: Setting
metadata:
  name: backup-target-credential-secret
  namespace: {{ .Release.Namespace }}
value: "longhorn-backup-target"        # name of the Secret materialized by the ExternalSecret in eso-backup-target.yaml