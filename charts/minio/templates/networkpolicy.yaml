{{- if .Values.networkPolicies.enabled }}
# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicies for the minio namespace.
# MinIO is the backup target for CNPG (cnpg-backups) and Vault (vault-backups),
# and serves its API/Console via Traefik ingress.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS egress for every pod in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Allow Traefik to reach MinIO server (S3 API on 9000) and Console (9001).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-minio
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - { protocol: TCP, port: 9000 }
        - { protocol: TCP, port: 9001 }
---
# Allow CNPG Postgres pods (any cluster in any namespace) to reach MinIO:9000
# for barmanObjectStore base + WAL backups.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-to-minio
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak       # where CNPG cluster lives
          podSelector:
            matchLabels:
              cnpg.io/cluster: keycloak-db
      ports:
        - { protocol: TCP, port: 9000 }
---
# Allow Vault pods to reach MinIO:9000 for snapshot CronJob uploads (Phase 11).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-to-minio
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - { protocol: TCP, port: 9000 }
---
# Allow MinIO provisioning Job to call MinIO server on 9000 (mc admin calls).
# Same namespace, so it's pod-to-pod within minio ns.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-provisioning-intra
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}                # any pod in the minio ns (e.g. provisioning Job)
      ports:
        - { protocol: TCP, port: 9000 }
        - { protocol: TCP, port: 9001 }
---
# MinIO provisioning Job needs egress to MinIO server in the same namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-intra-minio
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - { protocol: TCP, port: 9000 }
        - { protocol: TCP, port: 9001 }
{{- end }}
