# ClusterSecretStore - one source of secrets, referenced from any namespace.
#
# Auth flow: ESO's pod ServiceAccount JWT -> Vault K8s auth method ->
#   role "external-secrets" -> policy "eso-secret-reader" -> read on secret/data/*.
# All wired up by scripts/init-vault.ps1 in Phase 6.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"    # in-cluster HTTP; TLS terminated at Traefik for the UI
      path: "secret"                            # KV v2 mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"               # Vault's K8s auth backend path
          role: "external-secrets"               # role created in Phase 6
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets