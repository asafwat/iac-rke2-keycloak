# ESO pulls the MinIO `vault-sn-*` credentials (same Vault path the MinIO
# wrapper chart materializes into the minio namespace) into the vault
# namespace so the snapshot CronJob can use them.
#
# The conversionStrategy / decodingStrategy / metadataPolicy / nullBytePolicy
# fields are ESO mutating-webhook defaults. We write them explicitly so
# Argo's ServerSideApply diff doesn't flag the resource as OutOfSync.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-snapshot-minio-creds
  namespace: vault
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: vault-snapshot-minio-creds
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY
      remoteRef:
        key: minio/vault-snapshot-keys
        property: access_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: SECRET_KEY
      remoteRef:
        key: minio/vault-snapshot-keys
        property: secret_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
