# Egress for the snapshot CronJob: DNS + Vault API + MinIO API.
# Ingress not needed (no inbound traffic to the Job pod).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-snapshot-egress
  namespace: vault
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault-snapshot
  policyTypes: ["Egress"]
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Vault API (in the same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - port: 8200
          protocol: TCP
    # MinIO API
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
          podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - port: 9000
          protocol: TCP
    # Kubernetes API server (for the Vault `kubernetes` auth method projected
    # SA token review — happens server-side in the Vault pod, but the CronJob
    # also reads its own SA token via the projected volume). Keeping this
    # explicit because the default-deny in vault ns would otherwise hide a
    # surprising failure mode.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
