# Daily Vault Raft snapshot → MinIO s3://vault-backups/
#
# Two-container flow (init + main) so each container has the binaries it
# needs without us building a custom multi-tool image:
#
#   initContainer  hashicorp/vault       has `vault` CLI
#                  → login via k8s auth using projected SA JWT
#                  → `vault operator raft snapshot save /shared/snap`
#
#   container      bitnami/minio-client  has `mc`
#                  → `mc cp /shared/snap minio/vault-backups/<ts>.snap`
#                  → prune older than RETENTION_DAYS
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-snapshot
  namespace: vault
spec:
  schedule: "0 3 * * *"           # 03:00 daily, after CNPG at 02:00
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vault-snapshot
        spec:
          serviceAccountName: vault-snapshot
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: shared
              emptyDir: {}
          initContainers:
            - name: snapshot
              image: hashicorp/vault:1.21.2
              imagePullPolicy: IfNotPresent
              env:
                - name: VAULT_ADDR
                  value: "http://vault.vault.svc.cluster.local:8200"
                - name: VAULT_ROLE
                  value: "vault-snapshot"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 100               # hashicorp/vault image's vault user
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits:   { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: shared
                  mountPath: /shared
              command:
                - /bin/sh
                - -ec
                - |
                  ts=$(date -u +%Y%m%dT%H%M%SZ)
                  echo "[snapshot] starting at $ts"
                  jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  echo "[snapshot] vault login (role=$VAULT_ROLE)"
                  VAULT_TOKEN=$(vault write -field=token \
                    auth/kubernetes/login \
                    role="$VAULT_ROLE" \
                    jwt="$jwt")
                  export VAULT_TOKEN
                  echo "[snapshot] running raft snapshot save"
                  vault operator raft snapshot save /shared/vault-snapshot.snap
                  size=$(wc -c < /shared/vault-snapshot.snap)
                  echo "[snapshot] saved $size bytes"
                  echo "$ts" > /shared/timestamp
                  # vault writes 0600; upload container runs as a different UID
                  # but the same fsGroup. Make both files group-readable.
                  chmod 0640 /shared/vault-snapshot.snap /shared/timestamp
          containers:
            - name: upload
              image: bitnamilegacy/minio-client:2024.11.21-debian-12-r2
              imagePullPolicy: IfNotPresent
              env:
                - name: MINIO_ADDR
                  value: "http://minio.minio.svc.cluster.local:9000"
                - name: MINIO_BUCKET
                  value: "vault-backups"
                - name: RETENTION_DAYS
                  value: "7"
                - name: ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vault-snapshot-minio-creds
                      key: ACCESS_KEY
                - name: SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vault-snapshot-minio-creds
                      key: SECRET_KEY
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits:   { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: shared
                  mountPath: /shared
              command:
                - /bin/sh
                - -ec
                - |
                  ts=$(cat /shared/timestamp)
                  echo "[upload] aliasing minio"
                  mc alias set local "$MINIO_ADDR" "$ACCESS_KEY" "$SECRET_KEY" >/dev/null
                  object="local/${MINIO_BUCKET}/vault-snapshot-${ts}.snap"
                  echo "[upload] copying to ${object}"
                  mc cp /shared/vault-snapshot.snap "$object"
                  echo "[upload] pruning older than ${RETENTION_DAYS} days"
                  mc rm --recursive --force \
                    --older-than "${RETENTION_DAYS}d" \
                    "local/${MINIO_BUCKET}/" || true
                  echo "[upload] complete"
